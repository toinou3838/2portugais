services:
  - type: web
    name: o-mestre-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/start_render.py
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: APP_NAME
        value: O Mestre do Português API
      - key: API_PREFIX
        value: ""
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: o-mestre-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_AUDIENCE
        value: backend
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_API_BASE_URL
        value: https://api.clerk.com/v1
      - key: REMINDER_GOAL
        value: "50"
      - key: REMINDER_SEND_HOUR
        value: "21"
      - key: REMINDER_TIMEZONE
        value: Europe/Paris
      - key: REMINDER_AUTO_RUN_ENABLED
        value: "true"
      - key: REMINDER_JOB_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: REMINDER_FROM_EMAIL
        sync: false
      - key: TRANSLATION_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_API_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: DEEPL_API_KEY
        sync: false
      - key: DEEPL_API_URL
        value: https://api-free.deepl.com
      - key: LIBRETRANSLATE_URL
        sync: false
      - key: LIBRETRANSLATE_API_KEY
        sync: false
      - key: MYMEMORY_CONTACT_EMAIL
        sync: false
      - key: GOOGLE_SHEETS_ENABLED
        value: "false"
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SHEET_NAME
        value: Vocabulary
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false

databases:
  - name: o-mestre-db
    plan: basic-256mb
    databaseName: o_mestre_portugues
    user: o_mestre_user
